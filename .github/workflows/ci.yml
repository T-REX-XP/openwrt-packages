name: CI

on:
  push:
    branches: [main]
    paths:
      - "feeds/**"
      - ".github/**"
  pull_request:
    branches: [main]
    paths:
      - "feeds/**"
      - ".github/**"
  workflow_dispatch:
  # inputs:
  #   include_x86:
  #     description: Also build x86_64 (extra minutes)
  #     type: boolean
  #     default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-aarch64_generic:
    name: CM5 / aarch64_generic
    uses: ./.github/workflows/build-packages.yml
    with:
      arch: aarch64_generic-25.12-SNAPSHOT
      pkg_arch: aarch64_generic
      fetch_depth: 1
      timeout_minutes: 90
      upload_packages: true
      artifact_name: packages-aarch64_generic-immortalwrt-25.12-SNAPSHOT
      artifact_retention_days: 7

  # build-x86:
  #   name: x86_64 sanity check
  #   if: github.event_name == 'workflow_dispatch' && inputs.include_x86
  #   uses: ./.github/workflows/build-packages.yml
