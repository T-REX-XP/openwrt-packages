name: CI

on:
  push:
    branches: [main]
    paths:
      - "feeds/**"
      - ".github/**"
  pull_request:
    branches: [main]
    paths:
      - "feeds/**"
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build-cm5:
    name: Orange Pi CM5 (aarch64_generic)
    uses: ./.github/workflows/build-packages.yml
    with:
      arch: aarch64_generic-25.12-SNAPSHOT
      pkg_arch: aarch64_generic
      fetch_depth: 1
      timeout_minutes: 90
      upload_packages: true
      artifact_name: packages-cm5-aarch64_generic-immortalwrt-25.12-SNAPSHOT
      artifact_retention_days: 7
