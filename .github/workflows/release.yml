name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FEED_CHANNEL: immortalwrt-24.10
  SDK_RELEASE: 24.10-SNAPSHOT

permissions:
  contents: read

jobs:
  build-aarch64_generic:
    uses: ./.github/workflows/build-packages.yml
    secrets: inherit
    with:
      arch: rockchip-armv8-24.10-SNAPSHOT
      pkg_arch: aarch64_generic
      index: "1"
      fetch_depth: 1
      timeout_minutes: 120
      prepare_release_tarball: true

  build-aarch64_cortex-a53:
    uses: ./.github/workflows/build-packages.yml
    secrets: inherit
    with:
      arch: aarch64_cortex-a53-24.10-SNAPSHOT
      pkg_arch: aarch64_cortex-a53
      index: "1"
      fetch_depth: 1
      timeout_minutes: 120
      prepare_release_tarball: true

  build-aarch64_cortex-a72:
    uses: ./.github/workflows/build-packages.yml
    secrets: inherit
    with:
      arch: aarch64_cortex-a72-24.10-SNAPSHOT
      pkg_arch: aarch64_cortex-a72
      index: "1"
      fetch_depth: 1
      timeout_minutes: 120
      prepare_release_tarball: true

  build-x86_64:
    uses: ./.github/workflows/build-packages.yml
    secrets: inherit
    with:
      arch: x86_64-24.10-SNAPSHOT
      pkg_arch: x86_64
      index: "1"
      fetch_depth: 1
      timeout_minutes: 120
      prepare_release_tarball: true

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-aarch64_generic
      - build-aarch64_cortex-a53
      - build-aarch64_cortex-a72
      - build-x86_64
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: feed-*
          merge-multiple: true
          path: release-dist

      - name: Write SHA256SUMS
        run: |
          cd release-dist
          sha256sum openwrt_packages_*.tar.gz | tee SHA256SUMS
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-dist/openwrt_packages_*.tar.gz
            release-dist/SHA256SUMS

  pages:
    name: GitHub Pages feed
    runs-on: ubuntu-latest
    needs:
      - build-aarch64_generic
      - build-aarch64_cortex-a53
      - build-aarch64_cortex-a72
      - build-x86_64
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download release tarballs
        uses: actions/download-artifact@v8
        with:
          pattern: feed-*
          merge-multiple: true
          path: release-dist

      - name: Assemble static feed tree
        run: |
          set -euo pipefail
          mkdir -p public/${{ env.FEED_CHANNEL }}
          for tgz in release-dist/openwrt_packages_*.tar.gz; do
            base="$(basename "$tgz" .tar.gz)"
            pkg_arch="${base#openwrt_packages_}"
            pkg_arch="${pkg_arch%-immortalwrt-${{ env.SDK_RELEASE }}}"
            dest="public/${{ env.FEED_CHANNEL }}/${pkg_arch}"
            mkdir -p "$dest"
            tar -xzf "$tgz" -C "$dest"
          done
          find public -type f | sort | head -100

      - name: Install signing public keys
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          KEY_BUILD_PUB: ${{ secrets.KEY_BUILD_PUB }}
        run: |
          set -euo pipefail
          if [[ -n "$PUBLIC_KEY" ]]; then
            printf '%s\n' "$PUBLIC_KEY" > public/public-key.pem
          fi
          if [[ -n "$KEY_BUILD_PUB" ]]; then
            printf '%s\n' "$KEY_BUILD_PUB" > public/key-build.pub
          fi

      - name: Write feed index
        run: |
          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>openwrt_packages feed</title>
          </head>
          <body>
            <h1>openwrt_packages</h1>
            <p>ImmortalWrt / OpenWrt custom feed built from
              <a href="https://github.com/T-REX-XP/openwrt-packages">T-REX-XP/openwrt-packages</a>.
            </p>
            <p>Pick your architecture under <code>immortalwrt-24.10/</code> and follow
              <a href="https://github.com/T-REX-XP/openwrt-packages#option-d--install-from-published-feed">README Option D</a>.
            </p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
