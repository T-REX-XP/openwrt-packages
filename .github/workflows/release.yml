name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      publish_pages:
        description: Deploy feed to GitHub Pages
        type: boolean
        default: true
      skip_build:
        description: Republish Pages from latest GitHub Release (skip ~40 min SDK build)
        type: boolean
        default: false

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FEED_CHANNEL: immortalwrt-25.12
  SDK_RELEASE: 25.12-SNAPSHOT
  PKG_ARCH: aarch64_generic
  TARBALL: openwrt_packages_aarch64_generic-immortalwrt-25.12-SNAPSHOT.tar.gz

permissions:
  contents: read
  actions: write

jobs:
  build-cm5:
    name: Orange Pi CM5 (aarch64_generic)
    if: github.event_name != 'workflow_dispatch' || !inputs.skip_build
    uses: ./.github/workflows/build-packages.yml
    secrets: inherit
    with:
      arch: aarch64_generic-25.12-SNAPSHOT
      pkg_arch: aarch64_generic
      index: "1"
      fetch_depth: 1
      timeout_minutes: 120
      prepare_release_tarball: true

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-cm5
    if: >-
      always() &&
      needs.build-cm5.result == 'success' &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download release tarball
        uses: actions/download-artifact@v8
        with:
          pattern: feed-*
          merge-multiple: true
          path: release-dist

      - name: Extract public key from tarball
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          set -euo pipefail
          cd release-dist
          tar -xzf "${{ env.TARBALL }}" public-key.pem 2>/dev/null || true
          if [[ ! -f public-key.pem ]]; then
            if [[ -n "$PUBLIC_KEY" ]]; then
              printf '%s\n' "$PUBLIC_KEY" > public-key.pem
            elif [[ -n "$PRIVATE_KEY" ]]; then
              tmp="$(mktemp)"
              printf '%s\n' "$PRIVATE_KEY" | grep -v '^untrusted comment:' > "$tmp"
              {
                printf 'untrusted comment: openwrt-packages release key\n'
                openssl ec -in "$tmp" -pubout
              } > public-key.pem
              rm -f "$tmp"
            fi
          fi
          ls -la

      - name: Write SHA256SUMS
        run: |
          cd release-dist
          sha256sum openwrt_packages_*.tar.gz | tee SHA256SUMS
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-dist/openwrt_packages_*.tar.gz
            release-dist/SHA256SUMS
            release-dist/public-key.pem

  pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    needs: build-cm5
    if: >-
      always() &&
      (
        (needs.build-cm5.result == 'success' &&
         (startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_pages)))
        ||
        (github.event_name == 'workflow_dispatch' &&
         inputs.skip_build && inputs.publish_pages)
      )
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download release tarball (build artifact)
        if: needs.build-cm5.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: feed-*
          merge-multiple: true
          path: release-dist

      - name: Download tarball from GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.skip_build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-dist
          tag="$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)"
          echo "Using release tag: $tag"
          gh release download "$tag" \
            --repo "${{ github.repository }}" \
            --pattern "${{ env.TARBALL }}" \
            --dir release-dist
          ls -la release-dist/

      - name: Checkout (feed page generator)
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            scripts/generate-feed-pages.sh
          sparse-checkout-cone-mode: false

      - name: Assemble static feed tree
        run: |
          set -euo pipefail
          dest="public/${{ env.FEED_CHANNEL }}/${{ env.PKG_ARCH }}"
          mkdir -p "$dest"
          tar -xzf "release-dist/${{ env.TARBALL }}" -C "$dest"
          touch public/.nojekyll
          echo "Feed index: $dest/packages.adb ($(wc -c < "$dest/packages.adb") bytes)"
          find "$dest" -maxdepth 1 -name '*.apk' | wc -l | xargs echo ".apk files:"

      - name: Generate Pages index and public key
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          KEY_BUILD_PUB: ${{ secrets.KEY_BUILD_PUB }}
        run: |
          set -euo pipefail
          chmod +x scripts/generate-feed-pages.sh
          scripts/generate-feed-pages.sh \
            "public/${{ env.FEED_CHANNEL }}/${{ env.PKG_ARCH }}" \
            public \
            "${{ env.FEED_CHANNEL }}" \
            "${{ env.PKG_ARCH }}"
          if [[ -n "$KEY_BUILD_PUB" ]]; then
            printf '%s\n' "$KEY_BUILD_PUB" > public/key-build.pub
          fi
          find public -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify feed URL
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          base="${PAGE_URL%/}/"
          feed_url="${base}${{ env.FEED_CHANNEL }}/${{ env.PKG_ARCH }}/packages.adb"
          index_url="${base}${{ env.FEED_CHANNEL }}/${{ env.PKG_ARCH }}/"
          key_url="${base}public-key.pem"
          apk_url="${base}${{ env.FEED_CHANNEL }}/${{ env.PKG_ARCH }}/blocky-0.32.1-r2.apk"
          echo "Checking $feed_url"
          for attempt in 1 2 3 4 5 6; do
            if curl -fsI "$feed_url" | head -1 | grep -q '200'; then
              echo "Feed is live: $feed_url"
              curl -fsI "$index_url" | head -1 | grep -q '200' && echo "Feed index: $index_url"
              curl -fsI "$key_url" | head -1 | grep -q '200' && echo "Public key: $key_url" || \
                echo "::warning::public-key.pem not reachable (set PUBLIC_KEY or PRIVATE_KEY secret)"
              if curl -fsI "$apk_url" | head -1 | grep -q '200'; then
                echo "Sample package: $apk_url"
              else
                first_apk="$(curl -fs "$index_url" | grep -oE 'href="[^"]+\.apk"' | head -1 | sed 's/href="//;s/"//')"
                if [[ -n "$first_apk" ]]; then
                  curl -fsI "${base}${{ env.FEED_CHANNEL }}/${{ env.PKG_ARCH }}/$first_apk" | head -1
                fi
              fi
              exit 0
            fi
            echo "Attempt $attempt/6: not ready yet, waiting 15s…"
            sleep 15
          done
          echo "::error title=GitHub Pages feed not reachable::"
          echo "1. Open https://github.com/${{ github.repository }}/settings/pages"
          echo "2. Build and deployment → Source: **GitHub Actions** (not a branch)"
          echo "3. Re-run Release with **skip_build** + **publish_pages** (fast republish)"
          echo "Expected URL: $feed_url"
          exit 1
