name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FEED_CHANNEL: immortalwrt-25.12
  SDK_RELEASE: 25.12-SNAPSHOT
  # Orange Pi CM5 Base (RK3588, ImmortalWrt rockchip/armv8 → aarch64_generic packages)
  SDK_ARCH: aarch64_generic-25.12-SNAPSHOT
  PKG_ARCH: aarch64_generic

permissions:
  contents: read
  actions: write

jobs:
  build-cm5:
    name: Orange Pi CM5 (aarch64_generic)
    uses: ./.github/workflows/build-packages.yml
    secrets: inherit
    with:
      arch: ${{ env.SDK_ARCH }}
      pkg_arch: ${{ env.PKG_ARCH }}
      index: "1"
      fetch_depth: 1
      timeout_minutes: 120
      prepare_release_tarball: true

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-cm5
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download release tarball
        uses: actions/download-artifact@v8
        with:
          pattern: feed-*
          merge-multiple: true
          path: release-dist

      - name: Write SHA256SUMS
        run: |
          cd release-dist
          sha256sum openwrt_packages_*.tar.gz | tee SHA256SUMS
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-dist/openwrt_packages_*.tar.gz
            release-dist/SHA256SUMS

  pages:
    name: GitHub Pages feed
    runs-on: ubuntu-latest
    needs: build-cm5
    # Do not fail the release when Pages is not configured yet (404 until Settings → Pages → GitHub Actions).
    continue-on-error: true
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download release tarball
        uses: actions/download-artifact@v8
        with:
          pattern: feed-*
          merge-multiple: true
          path: release-dist

      - name: Assemble static feed tree
        run: |
          set -euo pipefail
          dest="public/${{ env.FEED_CHANNEL }}/${{ env.PKG_ARCH }}"
          mkdir -p "$dest"
          tar -xzf release-dist/openwrt_packages_${{ env.PKG_ARCH }}-immortalwrt-${{ env.SDK_RELEASE }}.tar.gz -C "$dest"
          find public -type f | sort

      - name: Install signing public keys
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          KEY_BUILD_PUB: ${{ secrets.KEY_BUILD_PUB }}
        run: |
          set -euo pipefail
          if [[ -n "$PUBLIC_KEY" ]]; then
            printf '%s\n' "$PUBLIC_KEY" > public/public-key.pem
          fi
          if [[ -n "$KEY_BUILD_PUB" ]]; then
            printf '%s\n' "$KEY_BUILD_PUB" > public/key-build.pub
          fi

      - name: Write feed index
        run: |
          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>openwrt_packages — Orange Pi CM5</title>
          </head>
          <body>
            <h1>openwrt_packages</h1>
            <p>ImmortalWrt feed for <strong>Orange Pi CM5 Base</strong> (RK3588 / <code>aarch64_generic</code>),
              built from
              <a href="https://github.com/T-REX-XP/openwrt-packages">T-REX-XP/openwrt-packages</a>.
            </p>
            <p>Feed path:
              <code>immortalwrt-25.12/aarch64_generic/</code> —
              <a href="https://github.com/T-REX-XP/openwrt-packages#option-d--install-from-published-feed">install instructions</a>.
            </p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Pages setup hint
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "::warning title=GitHub Pages not deployed::Enable Pages before the feed can go live."
          echo "1. Open https://github.com/${{ github.repository }}/settings/pages"
          echo "2. Build and deployment → Source: GitHub Actions"
          echo "3. Re-run this workflow (Actions → Release → Re-run failed jobs)"
          echo "Release artifacts and GitHub Release are unaffected."
          exit 0
